<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من صحة وثيقة الشكر والتقدير | Document Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --primary: #10b981;
            --primary-hover: #34d399;
            --danger: #ef4444;
            --success-glow: rgba(16, 185, 129, 0.15);
            --danger-glow: rgba(239, 68, 68, 0.15);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Cairo', 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }
        
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s infinite alternate ease-in-out;
        }
        
        body::before {
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            top: 10%;
            left: 10%;
        }
        
        body::after {
            background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
            bottom: 10%;
            right: 10%;
            animation-delay: -5s;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }
        
        .container {
            width: 100%;
            max-width: 550px;
            perspective: 1000px;
        }
        
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideIn 0.6s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px auto;
            position: relative;
            transition: all 0.4s ease;
        }
        
        .status-verified {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--primary);
            box-shadow: 0 0 20px var(--success-glow);
        }
        
        .status-unverified {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
            box-shadow: 0 0 20px var(--danger-glow);
        }
        
        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
            margin: 25px 0;
        }
        
        .details-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: right;
            margin-bottom: 10px;
        }
        
        .detail-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 14px 18px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: all 0.3s ease;
        }
        
        .detail-row:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }
        
        .detail-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .detail-value {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .reason-box {
            background: rgba(16, 185, 129, 0.03);
            border-right: 4px solid var(--primary);
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.8;
            text-align: justify;
            margin-top: 5px;
            color: #e2e8f0;
        }
        
        .footer-note {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 30px;
            line-height: 1.6;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 30px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="main-card">
            <div class="loading-spinner"></div>
            <p style="color: var(--text-secondary); font-size: 14px;">جاري التحقق من صحة المستند كودياً...</p>
        </div>
    </div>

    <script>
        const PUBLIC_KEY_PEM = `-----BEGIN PUBLIC KEY-----
MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAv9mPW8R5QgCtHzBPqwmP
7rfNEqq0TAUSGJLeS2vkySMjkdB4L/8iwlrQZinjMUqa0ByshAUaoajhxW4EDn4s
p+Mho5PC6i16fuk1PjahPODTzbcirl4k7FW7mnOifi3+4ilF7hUXR3U7yqPMbwq7
rULxSf1kfz6KUw80IzlHg9TOKDlOjvGZv9aYrs0077ueVIyErjj9caY3kwC3hu6Z
AidtMFFa8Eki6WkSl5O4K5o/1rlBPMW4NYe13+1QmjhsHTuaPBSx3KNofh8Bt6ux
2QWIE6OfpzJ+fXRBvwsJt8jLfdRuGhG2HqmgNsosqC0jnarVF/qYZLDvRfq6SQ8b
EwIDAQAB
-----END PUBLIC KEY-----`;

        function pemToArrayBuffer(pem) {
            const b64 = pem.replace(/-----BEGIN PUBLIC KEY-----/, '')
                            .replace(/-----END PUBLIC KEY-----/, '')
                            .replace(/\s/g, '');
            const binary = window.atob(b64);
            const len = binary.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }

        async function verifySignature(publicKeyPem, dataStr, signatureB64) {
            try {
                const keyBuffer = pemToArrayBuffer(publicKeyPem);
                const publicKey = await window.crypto.subtle.importKey(
                    "spki",
                    keyBuffer,
                    {
                        name: "RSASSA-PKCS1-v1_5",
                        hash: "SHA-256"
                    },
                    true,
                    ["verify"]
                );

                const encoder = new TextEncoder();
                const dataBuffer = encoder.encode(dataStr);

                let b64 = signatureB64.replace(/-/g, '+').replace(/_/g, '/');
                while (b64.length % 4) {
                    b64 += '=';
                }
                const binarySig = window.atob(b64);
                const sigBuffer = new Uint8Array(binarySig.length);
                for (let i = 0; i < binarySig.length; i++) {
                    sigBuffer[i] = binarySig.charCodeAt(i);
                }

                const isValid = await window.crypto.subtle.verify(
                    "RSASSA-PKCS1-v1_5",
                    publicKey,
                    sigBuffer,
                    dataBuffer
                );
                return isValid;
            } catch (e) {
                console.error("Verification error", e);
                return false;
            }
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p');
            const sig = params.get('sig');
            const card = document.getElementById('main-card');

            if (!p || !sig) {
                showFailure("مستند غير مكتمل", "لم يتم توفير معلمات التحقق اللازمة في رابط التحقق.");
                return;
            }

            try {
                let b64Url = p.replace(/-/g, '+').replace(/_/g, '/');
                while (b64Url.length % 4) {
                    b64Url += '=';
                }
                const decodedJson = decodeURIComponent(escape(window.atob(b64Url)));
                
                const isValid = await verifySignature(PUBLIC_KEY_PEM, decodedJson, sig);

                if (isValid) {
                    const payload = JSON.parse(decodedJson);
                    showSuccess(payload);
                } else {
                    showFailure("فشل التحقق الرقمي", "التوقيع المرفق بالرابط غير مطابق للبيانات، قد تكون البيانات تم تعديلها.");
                }
            } catch (e) {
                console.error("Parsing failed", e);
                showFailure("خطأ في قراءة البيانات", "صيغة معلمات التحقق غير صالحة.");
            }
        }

        function showSuccess(payload) {
            const card = document.getElementById('main-card');
            card.innerHTML = `
                <div class="icon-wrapper status-verified">
                    <i data-lucide="shield-check" style="width: 40px; height: 40px;"></i>
                </div>
                <h1>مستند رسمي موثق وموقع</h1>
                <p class="subtitle">Official Verified Document</p>
                
                <div class="divider"></div>
                
                <div class="details-list">
                    <div class="detail-row">
                        <span class="detail-label">الاسم الكامل / Full Name</span>
                        <span class="detail-value">${payload.n}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">الفصل الدراسي / Semester</span>
                        <span class="detail-value">${payload.s}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">غرض ومبرر التكريم / Reason</span>
                        <div class="reason-box">${payload.r}</div>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">الرمز الفرعي للشهادة / Certificate UUID</span>
                        <span class="detail-value" style="font-family: monospace; font-size: 12px; color: var(--text-secondary);">${payload.u}</span>
                    </div>
                </div>
                
                <div class="divider"></div>
                <p class="footer-note">هذه الوثيقة صادرة ومعتمدة رقمياً بنسبة 100% من قبل المنظومة الرسمية للديوان، ومحمية بتوقيع تشفير غير متماثل (RSA-2048).</p>
            `;
            lucide.createIcons();
        }

        function showFailure(title, description) {
            const card = document.getElementById('main-card');
            card.innerHTML = `
                <div class="icon-wrapper status-unverified">
                    <i data-lucide="shield-alert" style="width: 40px; height: 40px;"></i>
                </div>
                <h1 style="color: var(--danger);">${title}</h1>
                <p class="subtitle">Verification Unsuccessful</p>
                
                <div class="divider"></div>
                
                <p style="font-size: 15px; line-height: 1.8; color: var(--text-primary); margin-bottom: 20px;">
                    ${description}
                </p>
                
                <div class="divider"></div>
                <p class="footer-note">إذا قمت بمسح رمز QR من وثيقة مطبوعة، يرجى التأكد من أن الرابط لم يتعرض للتعديل أو التلف.</p>
            `;
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
